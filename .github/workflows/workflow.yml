name: Deploy Flask App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
                                                                                                                                                                               
      - name: Build and push Docker image
        run: |
          docker build -t mlops-9802:latest .
#          docker tag mlops-9802:latest ${{ secrets.DOCKER_USERNAME }}/mlops-9802:latest
#          docker push ${{ secrets.DOCKER_USERNAME }}/mlops-9802:latest    
  
          docker tag mlops-9802:latest ftheotiste/mlops-9802:latest
          docker push ftheotiste/mlops-9802:latest    
  
  
  
  
  
  
  
  
